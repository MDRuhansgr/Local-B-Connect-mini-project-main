version: '3.8'

services:
  # Main Traffic Control System
  traffic-control:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: traffic_control_main
    restart: unless-stopped
    ports:
      - "8501:8501"  # Streamlit dashboard
      - "8502:8502"  # FastAPI
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    environment:
      - DISPLAY=${DISPLAY}
      - CUDA_VISIBLE_DEVICES=0
      - PYTHONPATH=/app
      - TZ=Asia/Kolkata
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - traffic_network
    depends_on:
      - redis
      - influxdb
    command: ["all"]

  # Redis for caching and message queuing
  redis:
    image: redis:7-alpine
    container_name: traffic_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - traffic_network

  # InfluxDB for time-series data
  influxdb:
    image: influxdb:2.7-alpine
    container_name: traffic_influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=trafficcontrol123
      - DOCKER_INFLUXDB_INIT_ORG=traffic_org
      - DOCKER_INFLUXDB_INIT_BUCKET=traffic_data
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=traffic-admin-token-123456789
    networks:
      - traffic_network

  # Grafana for advanced analytics
  grafana:
    image: grafana/grafana:latest
    container_name: traffic_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=trafficcontrol123
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    networks:
      - traffic_network
    depends_on:
      - influxdb

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: traffic_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - traffic_network
    depends_on:
      - traffic-control
      - grafana

  # SUMO Simulation Service (separate container)
  sumo-simulation:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: traffic_sumo
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    environment:
      - DISPLAY=${DISPLAY}
      - SUMO_HOME=/usr/share/sumo
      - PYTHONPATH=/app
    networks:
      - traffic_network
    command: ["simulation"]

  # Security Alert Service
  security-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: traffic_security
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - PYTHONPATH=/app
    networks:
      - traffic_network
    depends_on:
      - redis
    command: ["api"]

  # Model Training Service (on-demand)
  training-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: traffic_training
    restart: "no"  # Only run when needed
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - PYTHONPATH=/app
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - traffic_network
    command: ["training"]

volumes:
  redis_data:
    driver: local
  influxdb_data:
    driver: local
  influxdb_config:
    driver: local
  grafana_data:
    driver: local

networks:
  traffic_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16